<!DOCTYPE html>
<html>
<head>
    <title>Data Purchase Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Zenon's Data Plans</h2>

    <label>Full Name:</label>
    <input type="text" id="fullname" placeholder="Enter your full name">

    <label>Phone Number:</label>
    <input type="text" placeholder="Enter your phone number">

    <label>Select Network:</label>
    <select>
        <option>MTN</option>
        <option>GLO</option>
        <option>AIRTEL</option>
        <option>9MOBILE</option>
    </select>

    <label>Select Data Plan:</label>
    <select id="plan" onchange="calculateTotal()">
        <option value="250">500MB</option>
        <option value="500">1000MB</option>
        <option value="1000">2000MB</option>
        <option value="1500">3000MB</option>
        <option value="2000">4000MB</option>
        <option value="2500">5000MB</option>
    </select>

    <label>Quantity:</label>
    <input type="number" id="quantity" value="1" min="1" onchange="calculateTotal()">

    <label>Price:</label>
    <div id="price">₦250</div>

    <label>Total Price:</label>
    <div id="total">₦250</div>

    <button type="button" onclick="submitForm()">Submit</button>
</div>

<script>
    function calculateTotal() {
        var price = document.getElementById("plan").value;
        var quantity = document.getElementById("quantity").value;

        document.getElementById("price").innerHTML = "₦" + price;
        document.getElementById("total").innerHTML = "₦" + (price * quantity);
    }

    function submitForm() {
        var name = document.getElementById("fullname").value;
        var plan = document.getElementById("plan");
        var planText = plan.options[plan.selectedIndex].text;
        var quantity = document.getElementById("quantity").value;
        var total = document.getElementById("total").innerHTML;

        alert("Dear " + name + ", your purchase of " + quantity + " x " + planText + " for " + total + " is successful, Thanks for patronising us!!");
    }
</script>

</body>
</html>
